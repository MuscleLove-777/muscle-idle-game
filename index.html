<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>マッスルパラダイス - 筋肉放置ゲーム</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- タイトル画面 -->
    <div id="screen-title" class="screen active">
      <div class="title-bg"></div>
      <div class="title-content">
        <h1 class="game-title">
          <span class="title-muscle">MUSCLE</span>
          <span class="title-paradise">PARADISE</span>
        </h1>
        <p class="title-sub">- 筋肉放置ゲーム -</p>
        <button id="btn-start" class="btn-main pulse">START</button>
      </div>
    </div>

    <!-- メイン画面 -->
    <div id="screen-main" class="screen">
      <!-- ヘッダー -->
      <header id="header">
        <div class="header-left">
          <span class="stat-label">筋肉Pt</span>
          <span id="muscle-points" class="stat-value">0</span>
        </div>
        <div class="header-center">
          <span id="current-character-name" class="character-name">???</span>
        </div>
        <div class="header-right">
          <span class="stat-label">Lv.</span>
          <span id="player-level" class="stat-value">1</span>
        </div>
      </header>

      <!-- キャラクター表示エリア -->
      <div id="character-area" class="tap-area">
        <video id="character-video" loop muted playsinline>
          <source src="" type="video/mp4">
        </video>
        <div id="tap-effect-container"></div>
        <div id="combo-display" class="hidden">
          <span id="combo-count">0</span>
          <span class="combo-label">COMBO!</span>
        </div>
        <!-- 放置収益表示 -->
        <div id="idle-earnings" class="hidden">
          <p>お留守の間に</p>
          <p class="idle-amount">+<span id="idle-amount-value">0</span> 筋肉Pt</p>
          <p>獲得しました！</p>
          <button id="btn-collect-idle" class="btn-sub">受け取る</button>
        </div>
      </div>

      <!-- ステータスバー -->
      <div id="status-bar">
        <div class="exp-bar-container">
          <div id="exp-bar" class="exp-bar" style="width: 0%"></div>
          <span id="exp-text" class="exp-text">0 / 100</span>
        </div>
        <div class="stats-row">
          <div class="stat-item">
            <span class="stat-icon">💪</span>
            <span class="stat-label">パワー</span>
            <span id="stat-power" class="stat-val">1</span>
          </div>
          <div class="stat-item">
            <span class="stat-icon">⚡</span>
            <span class="stat-label">自動/秒</span>
            <span id="stat-auto" class="stat-val">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-icon">🔥</span>
            <span class="stat-label">コンボ</span>
            <span id="stat-combo" class="stat-val">x1</span>
          </div>
        </div>
      </div>

      <!-- 下部ナビゲーション -->
      <nav id="bottom-nav">
        <button class="nav-btn active" data-tab="train">
          <span class="nav-icon">🏋️</span>
          <span class="nav-label">トレーニング</span>
        </button>
        <button class="nav-btn" data-tab="upgrade">
          <span class="nav-icon">⬆️</span>
          <span class="nav-label">強化</span>
        </button>
        <button class="nav-btn" data-tab="characters">
          <span class="nav-icon">👥</span>
          <span class="nav-label">キャラ</span>
        </button>
        <button class="nav-btn" data-tab="gallery">
          <span class="nav-icon">🖼️</span>
          <span class="nav-label">ギャラリー</span>
        </button>
      </nav>
    </div>

    <!-- 強化画面 -->
    <div id="screen-upgrade" class="screen">
      <header class="sub-header">
        <button class="btn-back" data-back="main">← 戻る</button>
        <h2>強化</h2>
        <div class="header-points">
          <span class="stat-label">筋肉Pt:</span>
          <span id="upgrade-points" class="stat-value">0</span>
        </div>
      </header>
      <div id="upgrade-list" class="scroll-area">
        <!-- 強化項目はJSで動的生成 -->
      </div>
    </div>

    <!-- キャラクター選択画面 -->
    <div id="screen-characters" class="screen">
      <header class="sub-header">
        <button class="btn-back" data-back="main">← 戻る</button>
        <h2>キャラクター</h2>
        <span id="char-count" class="count-badge">1/42</span>
      </header>
      <div class="scroll-area">
        <div id="character-grid" class="grid">
          <!-- キャラカードはJSで動的生成 -->
        </div>
      </div>
    </div>

    <!-- ギャラリー画面 -->
    <div id="screen-gallery" class="screen">
      <header class="sub-header">
        <button class="btn-back" data-back="main">← 戻る</button>
        <h2>ギャラリー</h2>
        <span id="gallery-count" class="count-badge">0/270</span>
      </header>
      <div class="scroll-area">
        <div id="gallery-grid" class="grid gallery-grid">
          <!-- ギャラリーアイテムはJSで動的生成 -->
        </div>
      </div>
    </div>

    <!-- 画像拡大ビューア -->
    <div id="image-viewer" class="overlay hidden">
      <button id="viewer-close" class="btn-close">✕</button>
      <img id="viewer-image" src="" alt="">
    </div>

    <!-- レベルアップ演出 -->
    <div id="levelup-overlay" class="overlay hidden">
      <div class="levelup-content">
        <h2>LEVEL UP!</h2>
        <p class="levelup-level">Lv.<span id="levelup-level-num">2</span></p>
        <p id="levelup-reward" class="levelup-reward"></p>
        <button id="btn-levelup-ok" class="btn-main">OK!</button>
      </div>
    </div>

    <!-- キャラ解放演出 -->
    <div id="unlock-overlay" class="overlay hidden">
      <div class="unlock-content">
        <h2>NEW CHARACTER!</h2>
        <video id="unlock-video" loop muted playsinline></video>
        <p id="unlock-name" class="unlock-name"></p>
        <button id="btn-unlock-ok" class="btn-main">やったー！</button>
      </div>
    </div>
  </div>

  <script src="js/gamedata.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
